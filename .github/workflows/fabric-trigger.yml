name: Trigger Fabric Pipeline

on:
  push:
    paths:
      - 'prompts/*.json'
  workflow_dispatch:
    inputs:
      json_path:
        description: 'Ruta del JSON a usar (opcional, p.ej. prompts/Test1.json)'
        required: false
        default: ''

jobs:
  run-fabric-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determinar el archivo JSON
        id: pick-file
        shell: bash
        run: |
          set -e

          FILE_INPUT="${{ github.event.inputs.json_path }}"
          if [ -n "$FILE_INPUT" ] && [ -f "$FILE_INPUT" ]; then
            FILE="$FILE_INPUT"
          else
            FILE=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^prompts/.*\.json$' | head -n 1 || true)
            if [ -z "$FILE" ]; then
              FILE=$(ls prompts/*.json 2>/dev/null | head -n 1 || true)
            fi
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No se encontró un archivo JSON válido en prompts/"; exit 1
          fi

          echo "Usando archivo: $FILE"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Validar JSON
        id: validate-json
        shell: bash
        run: |
          set -e
          FILE="${{ steps.pick-file.outputs.file }}"
          echo "Validando: $FILE"
          jq . "$FILE" > /dev/null

      # --- OPCIONAL HABILITADO: genera {"payload":"Hola"} y lo prioriza ---
      - name: (Opcional) Crear un JSON mínimo {"payload":"Hola"}
        id: override-file
        if: ${{ true }}  # <--- habilitado
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p prompts
          echo '{"payload":"Hola"}' > prompts/demo_hola.json
          echo "Se creó prompts/demo_hola.json con {\"payload\":\"Hola\"}"
          echo "file=prompts/demo_hola.json" >> "$GITHUB_OUTPUT"

      - name: Obtener token Azure AD
        id: token
        shell: bash
        run: |
          set -e

          RESP=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}&scope=https%3A%2F%2Fapi.fabric.microsoft.com%2F.default&client_secret=${{ secrets.AZURE_CLIENT_SECRET }}&grant_type=client_credentials" \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token")

          echo "$RESP" | jq . > /dev/null || { echo "Respuesta inválida al solicitar token"; echo "$RESP"; exit 1; }

          TOKEN=$(echo "$RESP" | jq -r .access_token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "No se obtuvo access_token"; exit 1
          fi

          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Probar acceso - listar workspaces
        shell: bash
        run: |
          echo "Listando workspaces visibles para el SP..."
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://api.fabric.microsoft.com/v1/workspaces" | jq .

      - name: Probar acceso - listar items del workspace
        shell: bash
        run: |
          echo "Listando items del workspace ${{ secrets.FABRIC_WORKSPACE_ID }}..."
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/items" | jq .

      - name: Probar acceso - obtener item específico (pipeline)
        shell: bash
        run: |
          echo "Obteniendo el item (pipeline) por ID..."
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/items/${{ secrets.FABRIC_PIPELINE_ID }}" | jq .

      - name: Obtener DataPipelines del workspace
        shell: bash
        run: |
          echo "Listando DataPipelines..."
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/dataPipelines" | jq .

      - name: Ejecutar Data Pipeline (params simples y capturar Location)
        id: run-pipeline
        shell: bash
        run: |
          set -euo pipefail

          # Elegir archivo: override (si existe) o el detectado
          FILE="${{ steps.pick-file.outputs.file }}"
          OVERRIDE="${{ steps.override-file.outputs.file }}"
          if [ -n "${OVERRIDE:-}" ]; then
            FILE="$OVERRIDE"
          fi

          echo "Archivo a enviar como payload: $FILE"

          # Opción A (comentada): Forzar "Hola" como string
          # PAYLOAD_STR=$(jq -n --arg v "Hola" '$v')

          # Opción B: usar el archivo seleccionado -> enviarlo como string JSON
          PAYLOAD_STR=$(jq -c . "$FILE")

          # Body correcto: parameters como objeto (no lista)
          BODY=$(jq -n \
            --arg payload "$PAYLOAD_STR" \
            '{
               executionData: {
                 parameters: {
                   payload: $payload
                 }
               }
             }')

          echo "Body (primeros 300 chars del valor de payload):"
          echo "$BODY" | jq -r '.executionData.parameters.payload' | head -c 300; echo

          # Endpoint moderno con jobType en la ruta
          RES_HEADERS=$(mktemp)
          RES_BODY=$(mktemp)

          HTTP_STATUS=$(curl -s -o "$RES_BODY" -D "$RES_HEADERS" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/items/${{ secrets.FABRIC_PIPELINE_ID }}/jobs/Pipeline/instances")

          echo "HTTP status: $HTTP_STATUS"
          echo "Body crudo de la respuesta (normalmente vacío en 202):"
          cat "$RES_BODY" || true
          echo

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "La API devolvió error (HTTP $HTTP_STATUS)"; exit 1
          fi

          # Extraer Location y obtener instanceId
          INSTANCE_URL=$(awk -F': ' 'tolower($1)=="location"{print $2}' "$RES_HEADERS" | tr -d '\r')
          if [ -z "$INSTANCE_URL" ]; then
            echo "No vino Location en la respuesta; no puedo determinar el jobInstanceId"; exit 1
          fi
          echo "Location: $INSTANCE_URL"

          INSTANCE_ID="${INSTANCE_URL##*/}"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
